apiVersion: v1
kind: Service
metadata:
  name: oracle23ai
  namespace: oracle
spec:
  selector:
    app: oracle23ai
  ports:
    - name: listener
      protocol: TCP
      port: 1521
      targetPort: 1521
    - name: em
      protocol: TCP
      port: 5500
      targetPort: 5500
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: oracle23ai-lb
  namespace: oracle
  annotations:
    metallb.universe.tf/address-pool: oracle-pool
spec:
  selector:
    app: oracle23ai
  type: LoadBalancer
  ports:
    - name: listener
      protocol: TCP
      port: 1521
      targetPort: 1521
    - name: em
      protocol: TCP
      port: 5500
      targetPort: 5500
