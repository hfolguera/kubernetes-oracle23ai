apiVersion: v1
kind: Service
metadata:
  name: metrics-exporter
  namespace: oracle
  labels:
    app: metrics-exporter
    release: stable
spec:
  type: ClusterIP
  ports:
    - port: 9161
      name: metrics
      targetPort: 9161
  selector:
    app: metrics-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-exporter-lb
  namespace: oracle
  annotations:
    metallb.universe.tf/address-pool: oracle-exporter-pool
  labels:
    app: metrics-exporter
    release: stable
spec:
  selector:
    app: metrics-exporter
  type: LoadBalancer
  ports:
    - name: metrics
      protocol: TCP
      port: 9161
      targetPort: 9161
