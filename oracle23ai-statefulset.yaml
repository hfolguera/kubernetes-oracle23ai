apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oracle23ai
  namespace: oracle
  labels:
    app: oracle23ai
spec:
  serviceName: "oracle23ai"
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: oracle23ai
  template:
    metadata:
      labels:
        app: oracle23ai
    spec:
      containers:
      - name: oracle23ai
        image: container-registry.oracle.com/database/free:latest
        env:
          - name: ORACLE_PWD
            valueFrom:
              secretKeyRef:
                name: oracle-pass
                key: password
          - name: ORACLE_PDB
            value: "FREEPDB1"
          - name: ORACLE_CHARACTERSET
            value: "AL32UTF8"
          - name: ENABLE_ARCHIVELOG
            value: "false"
          - name: ENABLE_FORCE_LOGGING
            value: "false"
        ports:
        - name: oracle
          containerPort: 1521
        - name: em
          containerPort: 5500
        volumeMounts:
        - name: oracle23ai-pv
          mountPath: /opt/oracle/oradata
  volumeClaimTemplates:
    - metadata:
        name: oracle23ai-pv
        namespace: oracle
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi

